name: 🔒 Secrets Scan

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so gitleaks can scan all commits

      - name: Install gitleaks
        run: |
          curl -sSL  https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz | tar xz -C /usr/local/bin

      - name: Run gitleaks (PR:scan file contents)
        if: github.event_name == 'pull_request'
        run: gitleaks protect --source . --report-format sarif --report-path gitleaks-report.sarif

      - name: Run gitleaks (Push:scan all commits)
        if: github.event_name == 'push'
        run: gitleaks detect --source . --report-format sarif --report-path gitleaks-report.sarif
