name: Build LaraKube CLI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Standalone Binaries
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP 8.4
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        tools: composer:v2
        extensions: pcntl, posix, mbstring, openssl, phar
        ini-values: phar.readonly=0

    - name: Install Dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Build All Platforms
      run: ./build --all ${{ github.sha }}

    - name: Organize Artifacts
      run: |
        mkdir -p artifacts
        cp builds/standalone/linux/linux-x64 artifacts/larakube-linux-x64
        cp builds/standalone/linux/linux-arm artifacts/larakube-linux-arm
        cp builds/standalone/mac/mac-x64 artifacts/larakube-mac-x64
        cp builds/standalone/mac/mac-arm artifacts/larakube-mac-arm
        chmod +x artifacts/*

    - name: Upload Binaries to Release
      uses: softprops/action-gh-release@v2
      if: github.event_name != 'pull_request'
      with:
        files: artifacts/*
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'canary' }}
        name: ${{ github.ref_type == 'tag' && github.ref_name || 'Canary (Main Branch)' }}
        body: |
          LaraKube Standalone Binaries
          Build Date: ${{ github.event.head_commit.timestamp }}
          Commit: ${{ github.sha }}
          
          Download the binary for your platform and move it to `/usr/local/bin/larakube`.
        draft: false
        prerelease: ${{ github.ref_type != 'tag' }}
        make_latest: ${{ github.ref_type == 'tag' && 'true' || 'false' }}
        generate_release_notes: true
        overwrite_files: true

    - name: Upload Artifacts (Workflow Run)
      uses: actions/upload-artifact@v4
      with:
        name: larakube-binaries
        path: artifacts/
        if-no-files-found: error
        retention-days: 7
