name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath, zip, pcntl, posix, openssl
          coverage: none

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Check Code Style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static Analysis (PHPStan / Larastan)
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Run Tests
        run: ./vendor/bin/pest

  publish:
    name: Build and Publish
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath, zip, pcntl, posix, openssl, phar
          ini-values: phar.readonly=0

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build Standalone Binaries
        run: ./build --all ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Organize Artifacts
        run: |
          mkdir -p artifacts
          cp builds/standalone/linux/linux-x64 artifacts/larakube-linux-x64
          cp builds/standalone/linux/linux-arm artifacts/larakube-linux-arm
          cp builds/standalone/mac/mac-x64 artifacts/larakube-mac-x64
          cp builds/standalone/mac/mac-arm artifacts/larakube-mac-arm
          chmod +x artifacts/*

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'canary' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Canary (Main Branch)' }}
          body: |
            LaraKube Standalone Binaries
            Build Date: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
            Version: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            
            Download the binary for your platform and move it to `/usr/local/bin/larakube`.
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          make_latest: ${{ github.ref_type == 'tag' && 'true' || 'false' }}
          generate_release_notes: true
          overwrite_files: true

  tap:
    name: Update Homebrew Tap
    needs: publish
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: luchavez-technologies/homebrew-larakube
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Download mac binaries and compute SHA256
        run: |
          VERSION="${{ github.ref_name }}"
          ARM_URL="https://github.com/luchavez-technologies/larakube-cli/releases/download/${VERSION}/larakube-mac-arm"
          X64_URL="https://github.com/luchavez-technologies/larakube-cli/releases/download/${VERSION}/larakube-mac-x64"
          curl -fsSL "$ARM_URL" -o /tmp/larakube-mac-arm
          curl -fsSL "$X64_URL" -o /tmp/larakube-mac-x64
          echo "SHA_ARM=$(sha256sum /tmp/larakube-mac-arm | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_X64=$(sha256sum /tmp/larakube-mac-x64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Stamp formula with version and SHA256
        run: |
          cp cli/homebrew-tap/Formula/larakube.rb tap/Formula/larakube.rb
          sed -i "s/LARAKUBE_VERSION/${{ env.VERSION }}/g" tap/Formula/larakube.rb
          sed -i "s/SHA256_MAC_ARM/${{ env.SHA_ARM }}/g" tap/Formula/larakube.rb
          sed -i "s/SHA256_MAC_X64/${{ env.SHA_X64 }}/g" tap/Formula/larakube.rb

      - name: Commit and push updated formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/larakube.rb
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update LaraKube CLI to ${{ github.ref_name }}"
          git push
